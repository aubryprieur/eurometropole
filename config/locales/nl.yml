      index:
        description: Welkom op de Open Data-pagina van %{organization_name}. Hier vindt u gegevensbestanden die regelmatig worden gegenereerd uit verschillende overleg- en bestuursprocessen binnen %{organization_name}. Deze bestanden worden beschikbaar gesteld om transparantie, toegankelijkheid en samenwerking te bevorderen. Hieronder vindt u gedetailleerde informatie over wat deze bestanden zijn, hoe u ze kunt openen en ermee kunt werken, en een beschrijving van de inhoud en structuur van elk bestand.
        detailed:
          body_1: "Hieronder vindt u een beschrijving van elke gegevensset, inclusief het schema (structuur) en het type informatie dat het bevat:"
          components: Componenten
          spaces: Participatieve ruimten
          title: Gedetailleerde uitleg van elk bestand
        download:
          components: Componenten
          core: Kern
          spaces: Participatieve ruimten
          title: Bronnen downloaden
        download_open_data: Alle Open Data-bestanden downloaden
        download_resource: "%{resource_name} downloaden in CSV-indeling"
        explanation:
          body_1: Deze bestanden zijn gegevenssets die zijn geëxporteerd uit de participatieve processen van %{organization_name}, zoals voorstellen, reacties en bijeenkomsten. Ze bevatten ruwe, gestructureerde gegevens die kunnen worden gebruikt voor analyse, onderzoek of integratie met andere hulpmiddelen. De gegevens worden elke 24 uur automatisch bijgewerkt, zodat u toegang heeft tot de meest recente informatie.
          body_2: Deze bestanden zijn in CSV-indeling (door komma's gescheiden waarden), een veelgebruikte bestandsindeling die kan worden geopend en verwerkt door verschillende softwaretoepassingen, waaronder spreadsheetprogramma's, teksteditors en gegevensanalysetools.
          title: Wat zijn deze bestanden?
        how_to:
          step_1:
            body_html: Klik op de onderstaande links om de CSV-bestanden naar uw computer te downloaden.
            title: 1. De bestanden downloaden
          step_2:
            body_html: |-
              <ul>
              <li><b>Spreadsheetprogramma's</b>: U kunt CSV-bestanden openen met programma's zoals Microsoft Excel, Google Sheets of LibreOffice Calc. Open het programma, selecteer "Openen" in het menu Bestand en kies het gedownloade CSV-bestand.</li>
              <li><b>Teksteditors</b>: CSV-bestanden kunnen ook worden geopend in elke teksteditor, zoals Kladblok of Sublime Text. Dit toont de ruwe gegevens, waarbij elke regel een record vertegenwoordigt en de verschillende waarden door een komma gescheiden zijn.</li>
              <li><b>Gegevensanalysetools</b>: Als u vertrouwd bent met gegevensanalysetools zoals Python (met pandas), R, of SQL-databases, kunt u deze CSV-bestanden rechtstreeks importeren voor verwerking en analyse.</li>
              </ul>
            title: 2. De bestanden openen
          step_3:
            body_html: |-
              <ul>
              <li><b>Filteren en sorteren</b>: In spreadsheetprogramma's kunt u de gegevens filteren en sorteren om u te concentreren op specifieke subsets van informatie.</li>
              <li><b>Analyse</b>: Gebruik de gegevens om verschillende analyses uit te voeren, zoals het tellen van het aantal voorstellen, het analyseren van trends in reacties of het evalueren van de deelname aan bijeenkomsten.</li>
              <li><b>Visualisatie</b>: U kunt grafieken, diagrammen en andere visualisaties maken om de gegevens te helpen interpreteren.</li>
              </ul>
            title: 3. Werken met de gegevens
          title: Hoe deze bestanden te openen en ermee te werken
